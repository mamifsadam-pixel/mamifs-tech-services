<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body{
  background:#020617;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Segoe UI;
}
.box{
  background:#0f172a;
  padding:30px;
  border-radius:12px;
  width:100%;
  max-width:350px;
}
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#020617;
  border:1px solid #1e293b;
  color:white;
}
button{
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#3b82f6;
  border:none;
  color:white;
  cursor:pointer;
}
/* Lamp */
#lamp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 40px;
  cursor: pointer;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px gold; }
  to { text-shadow: 0 0 20px gold; }
}

/* Login Modal */
#loginModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
}

.login-box {
  background: #0b1c2d;
  color: white;
  width: 300px;
  padding: 25px;
  margin: 15% auto;
  border-radius: 12px;
  text-align: center;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

.login-box button {
  background: gold;
  border: none;
  padding: 10px;
  width: 100%;
  cursor: pointer;
}

.login-box span {
  cursor: pointer;
  color: red;
}

</style>
</head>

<body>

<div class="box">
  <h2>Admin Login</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<script>
const firebaseConfig = {
  // 🔴 PASTE YOUR FIREBASE CONFIG HERE
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login(){
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  ).then(()=>{
    window.location.href="admin.html";
  }).catch(e=>{
    msg.innerText = e.message;
  });
}
</script>
<!-- Lamp Icon -->
<div id="lamp" onclick="openLogin()">💡</div>

<!-- Login Modal -->
<div id="loginModal">
  <div class="login-box">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error"></p>
    <span onclick="closeLogin()">✖</span>
  </div>
</div>
<script>
function openLogin() {
  document.getElementById("loginModal").style.display = "block";
}

function closeLogin() {
  document.getElementById("loginModal").style.display = "none";
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // DEMO ADMIN LOGIN
  if (email === "admin@mamifs.com" && password === "1234") {
    alert("Welcome Admin!");
    window.location.href = "admin.html";
  } else {
    document.getElementById("error").innerText = "Invalid login details";
  }
}
</script>

</body>
</html>
