<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lamp Login Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== RESET ===== */
*{box-sizing:border-box}
body{
  margin:0;
  height:100vh;
  background:#05080f;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Segoe UI, sans-serif;
  color:#fff;
  overflow:hidden;
  perspective:1200px;
}

/* ===== LAMP ===== */
.lamp-container{
  position:relative;
  text-align:center;
}

.cord{
  width:4px;
  height:140px;
  background:#111;
  margin:auto;
}

#lamp{
  width:120px;
  height:80px;
  background:linear-gradient(#111,#000);
  border-radius:0 0 60px 60px;
  cursor:pointer;
  transform-origin:top center;
  animation:swing 4s ease-in-out infinite;
  box-shadow:0 20px 40px rgba(0,0,0,.8);
}

@keyframes swing{
  0%{transform:rotate(2deg)}
  50%{transform:rotate(-2deg)}
  100%{transform:rotate(2deg)}
}

/* ===== LIGHT ===== */
.light{
  position:absolute;
  top:220px;
  left:50%;
  transform:translateX(-50%);
  width:360px;
  height:500px;
  background:radial-gradient(circle at top, rgba(255,215,120,.35), transparent 70%);
  clip-path:polygon(45% 0%,55% 0%,100% 100%,0% 100%);
  opacity:0;
  transition:.4s;
  pointer-events:none;
}

#lamp.on + .light{
  opacity:1;
}

/* ===== LOGIN ===== */
.login-box{
  position:absolute;
  top:480px;
  left:50%;
  transform:translateX(-50%);
  width:320px;
  background:rgba(15,20,35,.95);
  padding:25px;
  border-radius:12px;
  box-shadow:0 0 30px rgba(255,215,120,.15);
  opacity:0;
  pointer-events:none;
  transition:.4s;
}

.login-box.show{
  opacity:1;
  pointer-events:auto;
}

.login-box h2{
  margin-top:0;
  text-align:center;
  color:#ffd97a;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#0b1020;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:linear-gradient(135deg,#ffd97a,#caa13a);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.success{
  text-align:center;
  margin-top:15px;
  color:#7CFF7C;
  display:none;
}
</style>
</head>

<body>

<div class="lamp-container">
  <div class="cord"></div>

  <div id="lamp"></div>
  <div class="light"></div>

  <div class="login-box" id="loginBox">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="success" id="success">✅ Login successful</div>
  </div>
</div>

<script>
const lamp = document.getElementById("lamp");
const loginBox = document.getElementById("loginBox");

lamp.onclick = () => {
  lamp.classList.toggle("on");
  loginBox.classList.toggle("show");
};

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const success = document.getElementById("success");

  if(email && pass){
    success.style.display = "block";
  }else{
    alert("Enter email and password");
  }
}
</script>

</body>
</html>
