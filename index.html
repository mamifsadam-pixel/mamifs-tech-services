<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lamp Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #111 0%, #000 70%);
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
}

/* ===== LAMP ===== */
.lamp-container {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  cursor: pointer;
}

.cable {
  width: 4px;
  height: 180px;
  background: #444;
  margin: auto;
}

.lamp {
  width: 120px;
  height: 80px;
  background: #222;
  border-radius: 0 0 60px 60px;
  position: relative;
}

.light {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  background: radial-gradient(circle, rgba(255,215,120,0.8), transparent 70%);
  border-radius: 50%;
  opacity: 0;
  transition: all 0.5s ease;
}

/* ON STATE */
.on .light {
  width: 400px;
  height: 400px;
  opacity: 1;
}

/* ===== LOGIN ===== */
.login-box {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  background: rgba(0,0,0,0.85);
  padding: 25px;
  border-radius: 10px;
  text-align: center;
  display: none;
  box-shadow: 0 0 25px rgba(255,215,100,0.3);
}

.login-box h2 {
  margin-bottom: 15px;
  color: gold;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 5px;
}

.login-box button {
  width: 100%;
  padding: 10px;
  background: gold;
  color: black;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

/* ===== ADMIN ===== */
.admin {
  display: none;
  text-align: center;
  margin-top: 300px;
}

.admin h1 {
  color: gold;
}
</style>
</head>

<body>

<!-- LAMP -->
<div class="lamp-container" id="lamp" onclick="toggleLamp()">
  <div class="cable"></div>
  <div class="lamp">
    <div class="light"></div>
  </div>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button type="button" onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">
  <h1>Welcome Admin ✔️</h1>
  <button onclick="logout()">Logout</button>
</div>

<script>
const ADMIN_EMAIL = "admin@example.com";
const ADMIN_PASS = "123456";

function toggleLamp() {
  document.getElementById("lamp").classList.toggle("on");
  document.getElementById("loginBox").style.display = "block";
}

function login(){
  const e = document.getElementById("email").value;
  const p = document.getElementById("password").value;

  if(e === ADMIN_EMAIL && p === ADMIN_PASS){
    localStorage.setItem("loggedIn", "true");
    showAdmin();
  } else {
    alert("Wrong login ❌");
  }
}

function showAdmin(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("adminPanel").style.display = "block";
}

function logout(){
  localStorage.removeItem("loggedIn");
  location.reload();
}

window.onload = () => {
  if(localStorage.getItem("loggedIn") === "true"){
    showAdmin();
  }
}
</script>

</body>
</html>
