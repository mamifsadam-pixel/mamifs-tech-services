<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Lamp Login Website</title>
<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}

body{
  background:linear-gradient(135deg,#05080f,#0b1220);
  color:#eaeaea;
  min-height:100vh;
}
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle, #0a0f1f, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  color: #fff;
}

/* Lamp */
#lamp-container {
  text-align: center;
  cursor: pointer;
}

#lamp {
  width: 80px;
  height: 120px;
  background: #222;
  border-radius: 40px;
  box-shadow: inset 0 0 10px #000;
  transition: 0.5s;
}

/* Lamp ON */
#lamp.on {
  background: gold;
  box-shadow: 0 0 40px gold, 0 0 80px gold;
}

/* Login panel */
#login-panel {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 300px;
  padding: 20px;
  background: #0b132b;
  border-radius: 10px;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
  display: none;
}

#login-panel.show {
  display: block;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
}

button {
  background: gold;
  cursor: pointer;
  font-weight: bold;
}

/* HEADER */
header{
  padding:50px 20px;
  text-align:center;
}
header h1{font-size:2.6rem;color:#4da3ff}
header p{margin-top:10px;color:#aaa}

/* MAIN */
main{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:40px;
}

/* LAMP AREA */
.lamp-area{text-align:center}
.lamp-area p{color:#bbb;margin-bottom:15px}

.lamp{
  position:relative;
  width:120px;
  height:150px;
  background:#111;
  border-radius:12px 12px 40px 40px;
  cursor:pointer;
}
.lamp::before{
  content:"";
  position:absolute;
  top:-70px;
  left:50%;
  transform:translateX(-50%);
  width:6px;
  height:70px;
  background:#333;
}

.light{
  position:absolute;
  top:150px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:180px;
  background:radial-gradient(ellipse at top, rgba(255,215,120,.9), rgba(255,215,120,0));
  display:none;
}

/* LOGIN */
.login-box{
  display:none;
  background:#0b1220;
  padding:30px;
  border-radius:14px;
  width:320px;
  box-shadow:0 0 30px rgba(0,0,0,.6);
}
.login-box h2{text-align:center;color:#ffd66b;margin-bottom:20px}
.login-box input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:8px;
}
.login-box button{
  width:100%;
  padding:12px;
  background:#4da3ff;
  color:#000;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
.login-box .msg{text-align:center;margin-top:10px;font-size:.9rem}

/* DASHBOARD */
.dashboard{
  display:none;
  width:90%;
  max-width:900px;
  background:#0b1220;
  padding:30px;
  border-radius:16px;
}
.dashboard h2{color:#4da3ff;margin-bottom:15px}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}
.card{
  background:#05080f;
  padding:20px;
  border-radius:12px;
}
.card h3{color:#ffd66b;margin-bottom:8px}

footer{
  margin-top:50px;
  padding:20px;
  text-align:center;
  color:#666;
}
</style>
</head>
<body>

<!-- Lamp -->
<div id="lamp-container">
  <div id="lamp"></div>
  <p>Admin Access</p>
</div>

<!-- Login Panel (hidden) -->
<div id="login-panel">
  <form id="loginForm">
    <h2>Admin Login</h2>

    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Login</button>
    <p id="msg"></p>
  </form>
</div>

<script src="login.js"></script>
</body>

<body>

<header>
  <h1>Creative Tech Website</h1>
  <p>Click the lamp to access the admin panel</p>
</header>

<main>
  <!-- LAMP -->
  <div class="lamp-area">
    <p>Admin Access</p>
    <div class="lamp" id="lamp">
      <div class="light" id="light"></div>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="login-box" id="loginBox">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <h2>Dashboard</h2>
    <p>Welcome, Admin 👋</p>
    <div class="cards">
      <div class="card"><h3>Services</h3><p>Web Design, IT Support, Training</p></div>
      <div class="card"><h3>Clients</h3><p>Manage your clients</p></div>
      <div class="card"><h3>Settings</h3><p>Update website content</p></div>
    </div>
  </div>
</main>

<footer>© 2026 Creative Tech</footer>

<script>
// LAMP CLICK
const lamp=document.getElementById('lamp');
const light=document.getElementById('light');
const loginBox=document.getElementById('loginBox');

lamp.addEventListener('click',()=>{
  light.style.display='block';
  loginBox.style.display='block';
});

// LOGIN LOGIC (DEMO)
function login(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;
  const msg=document.getElementById('msg');

  if(email==='admin@example.com' && password==='1234'){
    document.getElementById('loginBox').style.display='none';
    document.getElementById('dashboard').style.display='block';
  }else{
    msg.style.color='red';
    msg.innerText='Invalid login details';
  }
}
</script>

</body>
</html>
