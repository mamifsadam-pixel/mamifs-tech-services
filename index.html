<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Lamp Login Website</title>
<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}

body{
  background:linear-gradient(135deg,#05080f,#0b1220);
  color:#eaeaea;
  min-height:100vh;
}

/* HEADER */
header{
  padding:50px 20px;
  text-align:center;
}
header h1{font-size:2.6rem;color:#4da3ff}
header p{margin-top:10px;color:#aaa}

/* MAIN */
main{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:40px;
}

/* LAMP AREA */
.lamp-area{text-align:center}
.lamp-area p{color:#bbb;margin-bottom:15px}

.lamp{
  position:relative;
  width:120px;
  height:150px;
  background:#111;
  border-radius:12px 12px 40px 40px;
  cursor:pointer;
}
.lamp::before{
  content:"";
  position:absolute;
  top:-70px;
  left:50%;
  transform:translateX(-50%);
  width:6px;
  height:70px;
  background:#333;
}

.light{
  position:absolute;
  top:150px;
  left:50%;
  transform:translateX(-50%);
  width:300px;
  height:180px;
  background:radial-gradient(ellipse at top, rgba(255,215,120,.9), rgba(255,215,120,0));
  display:none;
}

/* LOGIN */
.login-box{
  display:none;
  background:#0b1220;
  padding:30px;
  border-radius:14px;
  width:320px;
  box-shadow:0 0 30px rgba(0,0,0,.6);
}
.login-box h2{text-align:center;color:#ffd66b;margin-bottom:20px}
.login-box input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:8px;
}
.login-box button{
  width:100%;
  padding:12px;
  background:#4da3ff;
  color:#000;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
.login-box .msg{text-align:center;margin-top:10px;font-size:.9rem}

/* DASHBOARD */
.dashboard{
  display:none;
  width:90%;
  max-width:900px;
  background:#0b1220;
  padding:30px;
  border-radius:16px;
}
.dashboard h2{color:#4da3ff;margin-bottom:15px}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}
.card{
  background:#05080f;
  padding:20px;
  border-radius:12px;
}
.card h3{color:#ffd66b;margin-bottom:8px}

footer{
  margin-top:50px;
  padding:20px;
  text-align:center;
  color:#666;
}
</style>
</head>
<body>

<header>
  <h1>Creative Tech Website</h1>
  <p>Click the lamp to access the admin panel</p>
</header>

<main>
  <!-- LAMP -->
  <div class="lamp-area">
    <p>Admin Access</p>
    <div class="lamp" id="lamp">
      <div class="light" id="light"></div>
    </div>
  </div>

  <!-- LOGIN -->
 <form id="loginForm">
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit">Login</button>
</form>

<p id="msg"></p>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = new FormData();
  data.append("email", email.value);
  data.append("password", password.value);

  fetch("login.php", { method: "POST", body: data })
    .then(res => res.text())
    .then(res => {
      if (res.trim() === "success") {
        window.location = "dashboard.php";
      } else {
        document.getElementById("msg").innerText = "❌ Login failed";
      }
    });
});
</script>


  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <h2>Dashboard</h2>
    <p>Welcome, Admin 👋</p>
    <div class="cards">
      <div class="card"><h3>Services</h3><p>Web Design, IT Support, Training</p></div>
      <div class="card"><h3>Clients</h3><p>Manage your clients</p></div>
      <div class="card"><h3>Settings</h3><p>Update website content</p></div>
    </div>
  </div>
</main>

<footer>© 2026 Creative Tech</footer>

</body>
</html>
